<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte Post - Il Gioco di Quinn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            body {
                background-color: white !important;
            }
            .no-print {
                display: none !important;
            }
            .card {
                break-inside: avoid;
                box-shadow: none !important;
                border: 1px solid #d1d5db !important;
            }
            .page-container {
                max-width: 100% !important;
                padding: 0 !important;
                margin: 0 !important;
            }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-10">

    <!-- Header & Print Button -->
    <div class="no-print bg-white shadow-sm p-4 sticky top-0 z-50 flex justify-between items-center mb-8">
        <div>
            <h1 class="text-xl font-bold text-gray-800">Le Carte di Quinn (Formato Instagram)</h1>
            <p class="text-sm text-gray-500">Clicca su stampa. Consigliato: Layout Verticale, Margini predefiniti, Grafica in background disabilitata per risparmiare inchiostro.</p>
        </div>
        <button onclick="window.print()" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded-lg shadow-md transition">
            Stampa le Carte
        </button>
    </div>

    <!-- A4 Container -->
    <div class="page-container max-w-[210mm] mx-auto bg-white p-6 shadow-lg rounded-sm">
        
        <!-- Grid for Cards -->
        <div class="grid grid-cols-2 gap-8" id="cards-container">
            <!-- Cards will be injected here by JS -->
        </div>

    </div>

    <script>
        const posts = [
            {
                user: "art_academy_pro",
                avatarColor: "bg-blue-200",
                format: "▶ Video (15 min)",
                visualDesc: "Insegnante che disegna griglie alla lavagna",
                likes: "1.204",
                caption: "Tutorial: Le basi della prospettiva in 3 punti. Ritmo lento, molto educativo. ✍️📏 Prendi appunti e impara con noi!"
            },
            {
                user: "meme_lord99",
                avatarColor: "bg-yellow-300",
                format: "▶ Video (5 sec - LOOP)",
                visualDesc: "Gatto grasso che scivola e cade dal divano. Audio buffo.",
                likes: "845.392",
                caption: "Non riesco a smettere di guardarlo 😹🛋️ #lol #cats #fail"
            },
            {
                user: "hustle_culture_boss",
                avatarColor: "bg-gray-800",
                format: "▶ Video (1 min)",
                visualDesc: "Imprenditore arrabbiato in giacca e cravatta che urla contro la telecamera.",
                likes: "12.450",
                caption: "\"I giovani di oggi non vogliono più lavorare!\" Siete tutti rammolliti. Svegliatevi! 🤬📉 #grind #mindset"
            },
            {
                user: "nature_geo",
                avatarColor: "bg-green-200",
                format: "▶ Documentario",
                visualDesc: "Immagini mozzafiato dei ghiacciai che crollano. Voce narrante seria.",
                likes: "34.112",
                caption: "Lo scioglimento dei ghiacciai in diretta. Un problema che non possiamo più ignorare. 🌍🧊 #climatechange"
            },
            {
                user: "drama_alert_art",
                avatarColor: "bg-red-400",
                format: "▶ Video Gossip",
                visualDesc: "Scritte in sovraimpressione SHOCK, tizio che sussurra segreti.",
                likes: "156.789",
                caption: "DRAMMA nel mondo dell'arte! Il vostro creator preferito ha COPIATO TUTTO! 🚨 Le prove nel video. Scrivete cosa ne pensate nei commenti! 👇🎨"
            },
            {
                user: "sports_uncensored",
                avatarColor: "bg-orange-500",
                format: "▶ Video Shock",
                visualDesc: "Immagini ravvicinate, non censurate, di una caviglia che si spezza in campo.",
                likes: "405.000",
                caption: "Infortunio shock stanotte in NBA! ⚠️ Guardate la caviglia... Fa male solo a vederlo. 🏀💥 #nba #injury"
            },
            {
                user: "guitar_masterclass",
                avatarColor: "bg-amber-200",
                format: "▶ Video (10 min)",
                visualDesc: "Inquadratura fissa su una chitarra. Il maestro parla lentamente.",
                likes: "890",
                caption: "Lezione 1: Il giro di Do. Prendi la tua chitarra e impara con calma dove mettere le dita. 🎸🎼"
            },
            {
                user: "midnight.thoughts._",
                avatarColor: "bg-purple-900",
                format: "▶ Video Triste",
                visualDesc: "Filtro grigio, pioggia fuori dalla finestra, musica malinconica, scritte a schermo.",
                likes: "210.433",
                caption: "POV: Sei solo in camera tua alle 2 di notte e ripensi a tutti i tuoi fallimenti... 🌧️🎧 #sad #relatable"
            },
            {
                user: "shocking_news_daily",
                avatarColor: "bg-red-600",
                format: "▶ Video Virale",
                visualDesc: "Telecamera mossa, caos, urla, due persone che si spintonano violentemente.",
                likes: "567.890",
                caption: "\"Non crederai mai a cosa ha fatto questo attivista!\" Finisce malissimo! 😱💥 #news #crazy"
            },
            {
                user: "nba_highlights",
                avatarColor: "bg-blue-600",
                format: "▶ Video Partita",
                visualDesc: "Montaggio pulito delle migliori azioni della partita della scorsa notte.",
                likes: "45.670",
                caption: "Highlights della partita di ieri. Bei canestri, azioni pulite. Godetevi lo spettacolo! 🏀🔥"
            },
            {
                user: "dance_trends_now",
                avatarColor: "bg-pink-400",
                format: "▶ Video (15 sec)",
                visualDesc: "Tre ragazze fanno una coreografia identica a ritmo di musica pop.",
                likes: "1.2M",
                caption: "Il nuovo trend è qui! Coreografia facilissima da guardare in loop. 💃✨ #dance #trend"
            },
            {
                user: "alex_compagnodibanco",
                avatarColor: "bg-teal-300",
                format: "🖼️ Foto",
                visualDesc: "Gruppo di ragazzi sorridenti a una festa fantastica in piscina con drink.",
                likes: "245",
                caption: "La festa più bella di sempre! 🎉🍹 Che serata indimenticabile, mancano solo gli sfigati a casa. #summer #party"
            },
            {
                user: "satisfying.asmr",
                avatarColor: "bg-indigo-200",
                format: "▶ Video ASMR",
                visualDesc: "Mani che tagliano saponette colorate a cubetti. Nessuna voce.",
                likes: "3.4M",
                caption: "Taglio di sapone colorato. Alza il volume e rilassati. Solo suoni super soddisfacenti. 🧼🔪🤤"
            },
            {
                user: "tech_reviews_ita",
                avatarColor: "bg-gray-400",
                format: "▶ Video Recensione",
                visualDesc: "Inquadratura perfetta di un iPad nuovo di zecca, luci led colorate.",
                likes: "88.900",
                caption: "Ho provato il NUOVO iPad per disegnare da 1500€! Le funzioni sono magiche, lo devi avere per forza! 💻✨"
            },
            {
                user: "eco_warriors",
                avatarColor: "bg-green-600",
                format: "📑 Carosello (1/5)",
                visualDesc: "Prima slide con tanto testo piccolo e grafici statistici.",
                likes: "2.340",
                caption: "Come salvare le tartarughe marine nel tuo piccolo. Fai swipe e leggi i dati scientifici per capire l'impatto delle microplastiche 🐢📊"
            }
        ];

        // Instagram Icons SVG
        const iconHeart = `<svg aria-label="Mi piace" class="w-6 h-6 text-gray-800" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>`;
        const iconComment = `<svg aria-label="Commenta" class="w-6 h-6 text-gray-800" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>`;
        const iconShare = `<svg aria-label="Condividi" class="w-6 h-6 text-gray-800" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>`;
        const iconSave = `<svg aria-label="Salva" class="w-6 h-6 text-gray-800" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"></path></svg>`;
        const iconMore = `<svg aria-label="Altre opzioni" class="w-5 h-5 text-gray-800" fill="currentColor" viewBox="0 0 24 24"><path d="M12 14.5a2.5 2.5 0 100-5 2.5 2.5 0 000 5zm8 0a2.5 2.5 0 100-5 2.5 2.5 0 000 5zm-16 0a2.5 2.5 0 100-5 2.5 2.5 0 000 5z"></path></svg>`;

        const container = document.getElementById('cards-container');

        posts.forEach(post => {
            const cardHTML = `
                <div class="card border border-gray-300 rounded-md bg-white flex flex-col overflow-hidden relative" style="border-style: dashed; border-color: #9ca3af;">
                    <!-- Forbici indicatore per ritaglio -->
                    <div class="absolute -top-3 -left-3 bg-white px-1 text-gray-400 no-print text-xl">✂️</div>
                    
                    <!-- IG Header -->
                    <div class="flex justify-between items-center p-3 border-b border-gray-100">
                        <div class="flex items-center gap-2">
                            <div class="w-8 h-8 rounded-full ${post.avatarColor} border border-gray-200"></div>
                            <span class="font-bold text-sm text-gray-900">${post.user}</span>
                        </div>
                        <div>${iconMore}</div>
                    </div>

                    <!-- IG Image Placeholder (Print friendly) -->
                    <div class="aspect-square bg-gray-50 flex flex-col items-center justify-center p-6 text-center border-y border-gray-200">
                        <span class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">${post.format}</span>
                        <p class="text-gray-800 font-medium italic">"${post.visualDesc}"</p>
                    </div>

                    <!-- IG Actions -->
                    <div class="p-3">
                        <div class="flex justify-between mb-2">
                            <div class="flex gap-4">
                                ${iconHeart}
                                ${iconComment}
                                ${iconShare}
                            </div>
                            <div>
                                ${iconSave}
                            </div>
                        </div>
                        
                        <!-- Likes -->
                        <div class="font-bold text-sm text-gray-900 mb-1">
                            Piace a ${post.likes} persone
                        </div>

                        <!-- Caption -->
                        <div class="text-sm text-gray-800 leading-snug">
                            <span class="font-bold mr-1">${post.user}</span>
                            ${post.caption}
                        </div>
                    </div>
                </div>
            `;
            container.innerHTML += cardHTML;
        });
    </script>
</body>
</html>
